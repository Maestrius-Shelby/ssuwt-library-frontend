services:

  postgres-db:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ssuwt_library_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ssuwt
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "ssuwt_library_db", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# Backend prod
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: >
      sh -c "
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python ssuwt/create_superuser.py &&
        gunicorn stostatei.wsgi:application -c gunicorn.conf.py
      "
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=stostatei.settings
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend/media:/code/media
      - ./backend/static:/code/static
    networks:
      - ssuwt
    profiles:
      - prod

  # Frontend prod
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
#      args:
#        REACT_APP_API_BASE_URL: https://ssuwt-library.ru/api/
#        REACT_APP_MEDIA_URL: https://ssuwt-library.ru/
#    env_file: 
#      - ./frontend/.env
#    environment:
#      - REACT_APP_API_BASE_URL=https://ssuwt-library.ru/api/
#      - REACT_APP_MEDIA_URL=https://ssuwt-library.ru/
    depends_on:
      - backend-prod
    networks:
      - ssuwt
    volumes:
      - frontend_build:/usr/share/nginx/html
      - ./certbot/conf:/etc/letsencrypt:ro
    profiles:
      - prod

  # Nginx — только для prod (раздаёт фронтенд-статику и проксирует бэк)
  nginx:
    image: nginx:stable-alpine
    depends_on:
      - backend-prod
      - frontend-prod
    ports:
      - "80:80"
      - "8080:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/static:/code/static:ro
      - ./backend/media:/code/media:ro
      - frontend_build:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - ssuwt
    profiles:
      - prod

networks:
  ssuwt:
    driver: bridge

volumes:
  postgres_data:
  frontend_build:

