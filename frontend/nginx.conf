worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
    	listen 80;
    	server_name ssuwt-library.ru www.ssuwt-library.ru;

    	location /.well-known/acme-challenge/ {
            root /var/www/certbot;
    	}

        location / {
            return 301 https://$host$request_uri;
        }
    }
    server {
        listen 443 ssl;
        server_name ssuwt-library.ru www.ssuwt-library.ru;

	ssl_certificate /etc/letsencrypt/live/ssuwt-library.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ssuwt-library.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

	# React SPA (build в volumes)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Django backend
        location /api/ {
            proxy_pass http://backend-prod:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/start-parsing/ {
            proxy_pass http://backend-prod:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Увеличенные таймауты
            proxy_connect_timeout       600s;
            proxy_send_timeout          600s;
            proxy_read_timeout          600s;
            send_timeout                600s;
        }

        location /admin/ {
            proxy_pass http://backend-prod:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Origin $http_origin;
            proxy_pass_request_headers on;
        }

        # Статические файлы Django (если collectstatic выполнен)
        location /backend-static/ {
            alias /code/static/;
        }

        # Медиа-файлы Django (если нужно)
        location /media/ {
            alias /code/media/;
            
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Expose-Headers "Content-Disposition";
        }
    }
}
